{% extends 'base.html' %}

{% block title %}Payment | RedBus Clone{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="payment-container">
        <div class="payment-card">
            <div class="payment-header text-center">
                <h2>Complete Payment</h2>
                <p>Total Amount: <strong>₹{{ amount }}</strong></p>
            </div>
            
            <div class="payment-methods">
                <div class="method-option active">
                    <i class="fa-regular fa-credit-card"></i>
                    <span>Credit/Debit Card</span>
                </div>
                <div class="method-option">
                    <i class="fa-solid fa-building-columns"></i>
                    <span>Net Banking</span>
                </div>
                <div class="method-option">
                    <i class="fa-brands fa-google-pay"></i>
                    <span>UPI</span>
                </div>
            </div>
            
            <form action="{{ url_for('payment') }}" method="POST" id="paymentForm" class="payment-form">
                <div class="form-group">
                    <label>Card Number</label>
                    <div class="input-icon">
                        <i class="fa-regular fa-credit-card"></i>
                        <input type="text" placeholder="XXXX XXXX XXXX XXXX" required pattern="\d{16}" title="16 digit card number">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" required pattern="\d{2}/\d{2}">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" placeholder="XXX" required pattern="\d{3}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="Name on card" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="payBtn">
                    Pay ₹{{ amount }}
                </button>
            </form>
            
            <!-- Processing Overlay -->
            <div class="processing-overlay" id="processingOverlay" style="display: none;">
                <div class="spinner"></div>
                <h3>Processing Payment...</h3>
                <p>Please do not close or refresh this page.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent immediate submission
        
        // Show processing overlay
        document.getElementById('processingOverlay').style.display = 'flex';
        
        // Simulate a payment delay
        setTimeout(() => {
            this.submit(); // Actually submit the form after 2 seconds
        }, 2000);
    });
</script>
{% endblock %}
