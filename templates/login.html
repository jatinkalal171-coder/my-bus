{% extends 'base.html' %}

{% block title %}Login | RedBus Clone{% endblock %}

{% block content %}
<section class="auth-section section-padding">
    <div class="container auth-container">
        <div class="auth-card">
            <div class="auth-header text-center">
                <h2>Welcome Back</h2>
                <p>Log in to access your bookings and offers.</p>
            </div>
            
            <form action="{{ url_for('login', next=request.args.get('next')) }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" name="email" id="email" required placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" id="password" required placeholder="Enter your password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Log In</button>
            </form>
            
            <div class="auth-footer text-center">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
